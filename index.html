<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Maze Battle ⚔️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fredoka:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  overflow: hidden;
  font-family: 'Fredoka', sans-serif;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

canvas { display: block; }

/* ===== START SCREEN ===== */
#startScreen {
  position: fixed; inset: 0;
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  overflow: hidden;
}

#startScreen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(239,68,68,0.15) 0%, transparent 50%);
  animation: pulseGlow 4s ease-in-out infinite alternate;
}

@keyframes pulseGlow {
  from { opacity: 0.5; }
  to { opacity: 1; }
}

.maze-bg {
  position: absolute; inset: 0;
  opacity: 0.08;
}

.title {
  font-family: 'Bungee Shade', cursive;
  font-size: clamp(2.5rem, 8vw, 5rem);
  background: linear-gradient(135deg, #3b82f6, #f472b6, #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  position: relative;
  z-index: 1;
  animation: titleFloat 3s ease-in-out infinite;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(59,130,246,0.3));
}

@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.subtitle {
  color: #94a3b8;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  margin-top: 0.5rem;
  position: relative; z-index: 1;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.fighters {
  display: flex; gap: 1.5rem;
  margin: 2rem 0;
  position: relative; z-index: 1;
}

.fighter {
  width: 60px; height: 80px;
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 2rem;
  animation: fighterBounce 1.5s ease-in-out infinite;
  position: relative;
}

.fighter:nth-child(1) { background: rgba(59,130,246,0.2); border: 2px solid #3b82f6; animation-delay: 0s; }
.fighter:nth-child(2) { background: rgba(59,130,246,0.2); border: 2px solid #3b82f6; animation-delay: 0.2s; }
.fighter:nth-child(3) { background: rgba(239,68,68,0.2); border: 2px solid #ef4444; animation-delay: 0.4s; }
.fighter:nth-child(4) { background: rgba(239,68,68,0.2); border: 2px solid #ef4444; animation-delay: 0.6s; }

.fighter .label {
  font-size: 0.5rem;
  color: #fff;
  margin-top: 4px;
  white-space: nowrap;
}

@keyframes fighterBounce {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-8px) rotate(-3deg); }
  75% { transform: translateY(-4px) rotate(3deg); }
}

.start-btn {
  margin-top: 2rem;
  padding: 1rem 3rem;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ef4444);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  position: relative; z-index: 1;
  transition: all 0.3s;
  box-shadow: 0 0 30px rgba(139,92,246,0.4);
  animation: btnPulse 2s ease-in-out infinite;
}

.start-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 50px rgba(139,92,246,0.6);
}

@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 30px rgba(139,92,246,0.4); }
  50% { box-shadow: 0 0 50px rgba(139,92,246,0.7); }
}

.controls-hint {
  margin-top: 1.5rem;
  color: #475569;
  font-size: 0.85rem;
  text-align: center;
  position: relative; z-index: 1;
  line-height: 1.8;
}

.controls-hint span { color: #94a3b8; font-weight: 600; }

/* ===== LEVEL SELECT ===== */
#levelSelect {
  position: fixed; inset: 0;
  background: #0a0a0f;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 99;
}

#levelSelect h2 {
  font-family: 'Bungee Shade', cursive;
  font-size: 2.5rem;
  color: #e2e8f0;
  margin-bottom: 2rem;
}

.level-grid {
  display: flex; gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
}

.level-card {
  width: 140px; height: 160px;
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.level-card.easy {
  background: linear-gradient(135deg, #065f46, #059669);
  border: 2px solid #34d399;
}
.level-card.medium {
  background: linear-gradient(135deg, #92400e, #d97706);
  border: 2px solid #fbbf24;
}
.level-card.hard {
  background: linear-gradient(135deg, #7f1d1d, #dc2626);
  border: 2px solid #f87171;
}

.level-card:hover { transform: translateY(-6px) scale(1.05); }

.level-card .num {
  font-family: 'Bungee Shade', cursive;
  font-size: 3rem;
  color: #fff;
}

.level-card .diff {
  color: rgba(255,255,255,0.8);
  font-size: 0.9rem;
  font-weight: 600;
  margin-top: 4px;
}

.level-card.locked {
  opacity: 0.4;
  cursor: not-allowed;
  filter: grayscale(0.5);
}

.level-card.locked::after {
  content: '🔒';
  font-size: 2rem;
  position: absolute;
}

.level-card.locked .num,
.level-card.locked .diff { visibility: hidden; }

/* ===== HUD ===== */
#hud {
  position: fixed;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 2rem;
  z-index: 50;
  align-items: center;
}

.team-hud {
  padding: 8px 16px;
  border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-weight: 600;
  font-size: 0.9rem;
  backdrop-filter: blur(10px);
}

.team-hud.blue {
  background: rgba(59,130,246,0.2);
  border: 1px solid rgba(59,130,246,0.4);
  color: #93c5fd;
}

.team-hud.red {
  background: rgba(239,68,68,0.2);
  border: 1px solid rgba(239,68,68,0.4);
  color: #fca5a5;
}

.team-hud .items { display: flex; gap: 4px; font-size: 1.1rem; }

#levelBadge {
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(139,92,246,0.2);
  border: 1px solid rgba(139,92,246,0.4);
  color: #c4b5fd;
  font-weight: 700;
  font-size: 0.85rem;
}

/* ===== WIN SCREEN ===== */
#winScreen {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(8px);
}

#winScreen h1 {
  font-family: 'Bungee Shade', cursive;
  font-size: 3rem;
  margin-bottom: 1rem;
}

#winScreen .next-btn {
  margin-top: 1.5rem;
  padding: 0.8rem 2.5rem;
  font-family: 'Fredoka', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #8b5cf6, #6366f1);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
}

#winScreen .next-btn:hover { transform: scale(1.05); }

/* ===== MOBILE JOYSTICKS ===== */
.joystick-zone {
  position: fixed;
  bottom: 20px;
  width: 120px; height: 120px;
  z-index: 60;
  display: none;
}

.joystick-zone.left { left: 20px; }
.joystick-zone.right { right: 20px; }

.joystick-base {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  position: relative;
}

.joystick-knob {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  transition: background 0.2s;
}

.joystick-label {
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 0.7rem;
  font-weight: 600;
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <svg class="maze-bg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="mazeP" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <rect width="40" height="40" fill="none" stroke="#fff" stroke-width="1"/>
        <line x1="20" y1="0" x2="20" y2="20" stroke="#fff" stroke-width="1"/>
        <line x1="0" y1="20" x2="20" y2="20" stroke="#fff" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="800" height="600" fill="url(#mazeP)"/>
  </svg>

  <div class="title">MAZE BATTLE</div>
  <div class="subtitle">⚔️ Blue vs Red ⚔️</div>

  <div class="fighters">
    <div class="fighter">🧑‍💻<div class="label">P1</div></div>
    <div class="fighter">🤝<div class="label">Friend</div></div>
    <div class="fighter">🧑‍💻<div class="label">P2</div></div>
    <div class="fighter">🤝<div class="label">Friend</div></div>
  </div>

  <button class="start-btn" id="startBtn">🎮 LET'S PLAY!</button>

  <div class="controls-hint">
    <span>🔵 Blue Team:</span> WASD to move · Q to equip<br>
    <span>🔴 Red Team:</span> Arrow Keys to move · / to equip<br>
    <span>📱 Mobile:</span> Touch joysticks
  </div>
</div>

<!-- LEVEL SELECT -->
<div id="levelSelect">
  <h2>SELECT LEVEL</h2>
  <div class="level-grid" id="levelGrid"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="team-hud blue">
    🔵 Blue <div class="items" id="blueItems"></div>
  </div>
  <div id="levelBadge">LEVEL 1</div>
  <div class="team-hud red">
    🔴 Red <div class="items" id="redItems"></div>
  </div>
</div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <h1 id="winTitle"></h1>
  <p id="winSub" style="color:#94a3b8;font-size:1.2rem;"></p>
  <button class="next-btn" id="nextBtn">NEXT LEVEL ➡️</button>
</div>

<!-- MOBILE JOYSTICKS -->
<div class="joystick-zone left" id="joyLeft">
  <div class="joystick-base"><div class="joystick-knob" id="knobLeft"></div></div>
  <div class="joystick-label">Move (Blue)</div>
</div>
<div class="joystick-zone right" id="joyRight">
  <div class="joystick-base"><div class="joystick-knob" id="knobRight"></div></div>
  <div class="joystick-label">Move (Red)</div>
</div>

<canvas id="game"></canvas>

<script>
// ==================== GAME ENGINE ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// State
let currentLevel = 0;
let unlockedLevels = parseInt(localStorage.getItem('mazeBattle_unlocked') || '1');
let gameRunning = false;
let players = [];
let items = [];
let traps = [];
let maze = [];
let mazeW = 0, mazeH = 0;
const CELL = 40;

// Keys
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Resize
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ==================== MAZE GENERATION (Recursive Backtracker) ====================
function generateMaze(w, h) {
  const grid = [];
  for (let y = 0; y < h; y++) {
    grid[y] = [];
    for (let x = 0; x < w; x++) {
      grid[y][x] = { walls: [true, true, true, true], visited: false }; // top, right, bottom, left
    }
  }

  const stack = [];
  let cx = 0, cy = 0;
  grid[cy][cx].visited = true;
  stack.push([cx, cy]);

  while (stack.length > 0) {
    const neighbors = [];
    const dirs = [[0,-1,0,2],[1,0,1,3],[0,1,2,0],[-1,0,3,1]]; // dx,dy,wall,opposite

    for (const [dx, dy, wall, opp] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < w && ny >= 0 && ny < h && !grid[ny][nx].visited) {
        neighbors.push([nx, ny, wall, opp]);
      }
    }

    if (neighbors.length > 0) {
      const [nx, ny, wall, opp] = neighbors[Math.floor(Math.random() * neighbors.length)];
      grid[cy][cx].walls[wall] = false;
      grid[ny][nx].walls[opp] = false;
      grid[ny][nx].visited = true;
      stack.push([cx, cy]);
      cx = nx; cy = ny;
    } else {
      [cx, cy] = stack.pop();
    }
  }

  // Convert to tile map (each cell = 2x2 tiles + walls)
  const tw = w * 2 + 1;
  const th = h * 2 + 1;
  const tiles = [];
  for (let y = 0; y < th; y++) {
    tiles[y] = [];
    for (let x = 0; x < tw; x++) {
      tiles[y][x] = 1; // wall
    }
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const tx = x * 2 + 1;
      const ty = y * 2 + 1;
      tiles[ty][tx] = 0; // open cell

      if (!grid[y][x].walls[0] && ty - 1 >= 0) tiles[ty-1][tx] = 0; // top
      if (!grid[y][x].walls[1] && tx + 1 < tw) tiles[ty][tx+1] = 0; // right
      if (!grid[y][x].walls[2] && ty + 1 < th) tiles[ty+1][tx] = 0; // bottom
      if (!grid[y][x].walls[3] && tx - 1 >= 0) tiles[ty][tx-1] = 0; // left
    }
  }

  return { tiles, tw, th };
}

// ==================== LEVEL CONFIGS ====================
const LEVELS = [
  { name: 'Level 1', mazeSize: 8,  itemCount: 4, trapCount: 2,  color: '#34d399' },
  { name: 'Level 2', mazeSize: 12, itemCount: 6, trapCount: 5,  color: '#fbbf24' },
  { name: 'Level 3', mazeSize: 16, itemCount: 8, trapCount: 10, color: '#f87171' },
];

// ==================== ITEM & TRAP TYPES ====================
const ITEM_TYPES = [
  { name: 'shield', emoji: '🛡️', stat: 'defense' },
  { name: 'sword',  emoji: '⚔️', stat: 'attack' },
  { name: 'armor',  emoji: '🪖', stat: 'defense' },
  { name: 'float',  emoji: '✨', stat: 'speed' },
];

// ==================== PLACE ITEMS & TRAPS ====================
function placeItems(tiles, tw, th, count) {
  const result = [];
  const open = [];
  for (let y = 2; y < th - 2; y++) {
    for (let x = 2; x < tw - 2; x++) {
      if (tiles[y][x] === 0) open.push([x, y]);
    }
  }
  shuffle(open);
  for (let i = 0; i < Math.min(count, open.length); i++) {
    const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
    result.push({
      x: open[i][0] * CELL + CELL / 2,
      y: open[i][1] * CELL + CELL / 2,
      type,
      collected: false,
      bobOffset: Math.random() * Math.PI * 2,
    });
  }
  return result;
}

function placeTraps(tiles, tw, th, count) {
  const result = [];
  const open = [];
  for (let y = 3; y < th - 3; y++) {
    for (let x = 3; x < tw - 3; x++) {
      if (tiles[y][x] === 0) open.push([x, y]);
    }
  }
  shuffle(open);
  for (let i = 0; i < Math.min(count, open.length); i++) {
    result.push({
      x: open[i][0] * CELL + CELL / 2,
      y: open[i][1] * CELL + CELL / 2,
      active: true,
      pulsePhase: Math.random() * Math.PI * 2,
    });
  }
  return result;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ==================== PLAYER ====================
function createPlayer(team, tileX, tileY) {
  return {
    x: tileX * CELL + CELL / 2,
    y: tileY * CELL + CELL / 2,
    size: 14,
    speed: 2.5,
    team,
    color: team === 'blue' ? '#3b82f6' : '#ef4444',
    glow: team === 'blue' ? 'rgba(59,130,246,0.4)' : 'rgba(239,68,68,0.4)',
    inventory: [],
    equipped: null,
    stunned: 0,
    reachedGoal: false,
    trail: [],
  };
}

// ==================== COLLISION ====================
function wallAt(px, py) {
  const tx = Math.floor(px / CELL);
  const ty = Math.floor(py / CELL);
  if (tx < 0 || tx >= maze.tw || ty < 0 || ty >= maze.th) return true;
  return maze.tiles[ty][tx] === 1;
}

function canMove(p, dx, dy) {
  const nx = p.x + dx;
  const ny = p.y + dy;
  const r = p.size * 0.6;
  return !wallAt(nx - r, ny - r) && !wallAt(nx + r, ny - r) &&
         !wallAt(nx - r, ny + r) && !wallAt(nx + r, ny + r);
}

// ==================== INIT LEVEL ====================
function initLevel(levelIdx) {
  currentLevel = levelIdx;
  const cfg = LEVELS[levelIdx];
  const m = generateMaze(cfg.mazeSize, cfg.mazeSize);
  maze = m;

  // Players — blue top-left, red bottom-right
  players = [
    createPlayer('blue', 1, 1),
    createPlayer('red', m.tw - 2, m.th - 2),
  ];

  // Goal positions: blue needs to reach bottom-right, red needs to reach top-left
  players[0].goalX = (m.tw - 2) * CELL + CELL / 2;
  players[0].goalY = (m.th - 2) * CELL + CELL / 2;
  players[1].goalX = 1 * CELL + CELL / 2;
  players[1].goalY = 1 * CELL + CELL / 2;

  items = placeItems(m.tiles, m.tw, m.th, cfg.itemCount);
  traps = placeTraps(m.tiles, m.tw, m.th, cfg.trapCount);

  // HUD
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('levelBadge').textContent = cfg.name.toUpperCase();
  updateHUD();

  // Mobile joysticks
  if ('ontouchstart' in window) {
    document.getElementById('joyLeft').style.display = 'block';
    document.getElementById('joyRight').style.display = 'block';
  }

  gameRunning = true;
}

// ==================== HUD ====================
function updateHUD() {
  for (const p of players) {
    const el = document.getElementById(p.team === 'blue' ? 'blueItems' : 'redItems');
    el.innerHTML = p.inventory.map(i => i.type.emoji).join('') || '—';
  }
}

// ==================== UPDATE ====================
function update() {
  if (!gameRunning) return;

  const time = performance.now() / 1000;

  for (const p of players) {
    if (p.stunned > 0) { p.stunned--; continue; }

    let dx = 0, dy = 0;

    if (p.team === 'blue') {
      if (keys['w'] || keys['arrowup'] && false) dy = -p.speed;
      if (keys['s'] || keys['arrowdown'] && false) dy = p.speed;
      if (keys['a'] || keys['arrowleft'] && false) dx = -p.speed;
      if (keys['d'] || keys['arrowright'] && false) dx = p.speed;
      // Joystick
      if (joyInputLeft.x !== 0 || joyInputLeft.y !== 0) {
        dx = joyInputLeft.x * p.speed;
        dy = joyInputLeft.y * p.speed;
      }
      // Equip
      if (keys['q'] && p.inventory.length > 0) {
        const idx = p.equipped === null ? 0 : (p.equipped + 1) % p.inventory.length;
        p.equipped = idx;
        keys['q'] = false;
      }
    } else {
      if (keys['arrowup']) dy = -p.speed;
      if (keys['arrowdown']) dy = p.speed;
      if (keys['arrowleft']) dx = -p.speed;
      if (keys['arrowright']) dx = p.speed;
      // Joystick
      if (joyInputRight.x !== 0 || joyInputRight.y !== 0) {
        dx = joyInputRight.x * p.speed;
        dy = joyInputRight.y * p.speed;
      }
      // Equip
      if (keys['/'] && p.inventory.length > 0) {
        const idx = p.equipped === null ? 0 : (p.equipped + 1) % p.inventory.length;
        p.equipped = idx;
        keys['/'] = false;
      }
    }

    // Normalize diagonal
    if (dx !== 0 && dy !== 0) {
      const f = 0.707;
      dx *= f; dy *= f;
    }

    // Speed boost from float item
    const hasFloat = p.inventory.some(i => i.type.name === 'float');
    if (hasFloat) { dx *= 1.3; dy *= 1.3; }

    if (dx !== 0 && canMove(p, dx, 0)) p.x += dx;
    if (dy !== 0 && canMove(p, 0, dy)) p.y += dy;

    // Trail
    p.trail.push({ x: p.x, y: p.y, age: 0 });
    if (p.trail.length > 20) p.trail.shift();
    p.trail.forEach(t => t.age++);

    // Pick up items
    for (const item of items) {
      if (item.collected) continue;
      const dist = Math.hypot(item.x - p.x, item.y - p.y);
      if (dist < 20) {
        item.collected = true;
        item.collectedBy = p.team;
        p.inventory.push(item);
        updateHUD();
      }
    }

    // Traps
    for (const trap of traps) {
      if (!trap.active) continue;
      const dist = Math.hypot(trap.x - p.x, trap.y - p.y);
      // Shield protection
      const hasShield = p.equipped !== null && p.inventory[p.equipped]?.type.name === 'shield';
      if (dist < 18) {
        if (hasShield) {
          // Shield absorbs trap, shield used up
          p.inventory.splice(p.equipped, 1);
          p.equipped = p.inventory.length > 0 ? 0 : null;
          trap.active = false;
          updateHUD();
        } else {
          p.stunned = 60; // 1 second stun
          trap.active = false;
        }
      }
    }

    // Goal check
    const goalDist = Math.hypot(p.goalX - p.x, p.goalY - p.y);
    if (goalDist < 22) {
      p.reachedGoal = true;
    }
  }

  // Win check
  const winner = players.find(p => p.reachedGoal);
  if (winner) {
    gameRunning = false;
    showWin(winner);
  }
}

// ==================== DRAW ====================
function draw() {
  const time = performance.now() / 1000;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameRunning && !players.length) return;

  // Camera: center between both players with auto-zoom to fit both
  const camX = (players[0].x + players[1].x) / 2;
  const camY = (players[0].y + players[1].y) / 2;

  // Calculate zoom to keep both players visible with padding
  const dx = Math.abs(players[0].x - players[1].x) + 200;
  const dy = Math.abs(players[0].y - players[1].y) + 200;
  const zoomX = canvas.width / dx;
  const zoomY = canvas.height / dy;
  let zoom = Math.min(zoomX, zoomY, 2.5); // max zoom 2.5x
  zoom = Math.max(zoom, 0.2); // min zoom 0.2x for large mazes

  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-camX, -camY);

  // Draw maze
  const levelColor = LEVELS[currentLevel]?.color || '#34d399';
  for (let y = 0; y < maze.th; y++) {
    for (let x = 0; x < maze.tw; x++) {
      if (maze.tiles[y][x] === 1) {
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        // Top edge highlight
        ctx.fillStyle = 'rgba(148,163,184,0.08)';
        ctx.fillRect(x * CELL, y * CELL, CELL, 2);
      } else {
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }
  }

  // Draw grass patches (decoration)
  for (let y = 0; y < maze.th; y++) {
    for (let x = 0; x < maze.tw; x++) {
      if (maze.tiles[y][x] === 0 && (x + y) % 7 === 0) {
        ctx.fillStyle = 'rgba(34,197,94,0.08)';
        ctx.beginPath();
        ctx.arc(x * CELL + CELL/2, y * CELL + CELL/2, 12, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Draw goals
  for (const p of players) {
    const pulse = 0.5 + 0.5 * Math.sin(time * 3);
    ctx.fillStyle = p.team === 'blue'
      ? `rgba(59,130,246,${0.15 + pulse * 0.15})`
      : `rgba(239,68,68,${0.15 + pulse * 0.15})`;
    ctx.beginPath();
    ctx.arc(p.goalX, p.goalY, 16 + pulse * 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '16px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏁', p.goalX, p.goalY);
  }

  // Draw items
  for (const item of items) {
    if (item.collected) continue;
    const bob = Math.sin(time * 3 + item.bobOffset) * 4;
    // White glow (uncollected = white)
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(item.x, item.y + bob, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(item.type.emoji, item.x, item.y + bob);
  }

  // Draw traps
  for (const trap of traps) {
    if (!trap.active) continue;
    const pulse = 0.5 + 0.5 * Math.sin(time * 5 + trap.pulsePhase);
    ctx.fillStyle = `rgba(220,38,38,${0.1 + pulse * 0.2})`;
    ctx.beginPath();
    ctx.arc(trap.x, trap.y, 10 + pulse * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💀', trap.x, trap.y);
  }

  // Draw players
  for (const p of players) {
    // Trail
    for (const t of p.trail) {
      const alpha = Math.max(0, 1 - t.age / 20) * 0.3;
      ctx.fillStyle = p.team === 'blue'
        ? `rgba(59,130,246,${alpha})`
        : `rgba(239,68,68,${alpha})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer ring (pulsing)
    const ringPulse = 0.7 + 0.3 * Math.sin(time * 4);
    ctx.strokeStyle = p.stunned > 0 ? '#6b7280' : p.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 22 + ringPulse * 4, 0, Math.PI * 2);
    ctx.stroke();

    // Glow
    ctx.fillStyle = p.glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 26, 0, Math.PI * 2);
    ctx.fill();

    // Body (bigger)
    ctx.fillStyle = p.stunned > 0 ? '#6b7280' : p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
    ctx.fill();

    // Arrow indicator pointing up
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - 32);
    ctx.lineTo(p.x - 6, p.y - 24);
    ctx.lineTo(p.x + 6, p.y - 24);
    ctx.closePath();
    ctx.fill();

    // Team label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Fredoka, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.team === 'blue' ? 'B' : 'R', p.x, p.y);

    // Equipped item display
    if (p.equipped !== null && p.inventory[p.equipped]) {
      const eq = p.inventory[p.equipped];
      ctx.font = '14px serif';
      ctx.fillText(eq.type.emoji, p.x + 16, p.y - 14);
      // Color tint for team
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(p.x + 16, p.y - 14, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Stun indicator
    if (p.stunned > 0) {
      ctx.font = '14px serif';
      ctx.fillText('💫', p.x, p.y - 22);
    }
  }

  ctx.restore();

  // ==================== MINIMAP ====================
  if (maze && maze.tiles) {
    const mmScale = 3;
    const mmW = maze.tw * mmScale;
    const mmH = maze.th * mmScale;
    const mmX = canvas.width - mmW - 10;
    const mmY = canvas.height - mmH - 20; // bottom-right to avoid HUD overlap

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(mmX - 2, mmY - 2, mmW + 4, mmH + 4);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.strokeRect(mmX - 2, mmY - 2, mmW + 4, mmH + 4);

    // Maze
    for (let y = 0; y < maze.th; y++) {
      for (let x = 0; x < maze.tw; x++) {
        ctx.fillStyle = maze.tiles[y][x] === 1 ? '#334155' : '#0f172a';
        ctx.fillRect(mmX + x * mmScale, mmY + y * mmScale, mmScale, mmScale);
      }
    }

    // Players on minimap
    for (const p of players) {
      const px = mmX + (p.x / CELL) * mmScale;
      const py = mmY + (p.y / CELL) * mmScale;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Goals on minimap
    for (const p of players) {
      const gx = mmX + (p.goalX / CELL) * mmScale;
      const gy = mmY + (p.goalY / CELL) * mmScale;
      ctx.fillStyle = p.team === 'blue' ? 'rgba(59,130,246,0.6)' : 'rgba(239,68,68,0.6)';
      ctx.fillRect(gx - 2, gy - 2, 4, 4);
    }
  }
}

// ==================== WIN ====================
function showWin(winner) {
  const ws = document.getElementById('winScreen');
  const title = document.getElementById('winTitle');
  const sub = document.getElementById('winSub');
  const nextBtn = document.getElementById('nextBtn');

  title.style.color = winner.team === 'blue' ? '#3b82f6' : '#ef4444';
  title.textContent = `🎉 ${winner.team.toUpperCase()} TEAM WINS!`;
  sub.textContent = `Items collected: ${winner.inventory.length}`;

  if (currentLevel < LEVELS.length - 1) {
    nextBtn.textContent = 'NEXT LEVEL ➡️';
    nextBtn.onclick = () => {
      ws.style.display = 'none';
      if (currentLevel + 1 >= unlockedLevels) {
        unlockedLevels = currentLevel + 2;
        localStorage.setItem('mazeBattle_unlocked', unlockedLevels);
      }
      initLevel(currentLevel + 1);
    };
  } else {
    nextBtn.textContent = '🏆 PLAY AGAIN';
    nextBtn.onclick = () => {
      ws.style.display = 'none';
      showLevelSelect();
    };
  }

  ws.style.display = 'flex';
}

// ==================== LEVEL SELECT ====================
function showLevelSelect() {
  document.getElementById('hud').style.display = 'none';
  document.getElementById('joyLeft').style.display = 'none';
  document.getElementById('joyRight').style.display = 'none';

  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';

  LEVELS.forEach((lvl, i) => {
    const card = document.createElement('div');
    const classes = ['level-card'];
    if (i === 0) classes.push('easy');
    else if (i === 1) classes.push('medium');
    else classes.push('hard');
    if (i >= unlockedLevels) classes.push('locked');
    card.className = classes.join(' ');

    card.innerHTML = `<div class="num">${i + 1}</div><div class="diff">${lvl.name}</div>`;

    if (i < unlockedLevels) {
      card.onclick = () => {
        document.getElementById('levelSelect').style.display = 'none';
        initLevel(i);
      };
    }

    grid.appendChild(card);
  });

  document.getElementById('levelSelect').style.display = 'flex';
}

// ==================== MOBILE JOYSTICK ====================
const joyInputLeft = { x: 0, y: 0 };
const joyInputRight = { x: 0, y: 0 };
let joyTouches = {};

function setupJoystick(zoneId, knobId, inputObj) {
  const zone = document.getElementById(zoneId);
  const knob = document.getElementById(knobId);
  const maxDist = 38;

  function handleMove(cx, cy) {
    const rect = zone.getBoundingClientRect();
    const baseX = rect.left + rect.width / 2;
    const baseY = rect.top + rect.height / 2;
    let dx = cx - baseX;
    let dy = cy - baseY;
    const dist = Math.hypot(dx, dy);
    if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    inputObj.x = dx / maxDist;
    inputObj.y = dy / maxDist;
  }

  function resetJoy() {
    knob.style.transform = 'translate(-50%, -50%)';
    inputObj.x = 0;
    inputObj.y = 0;
  }

  zone.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      joyTouches[t.identifier] = zoneId;
      handleMove(t.clientX, t.clientY);
    }
  }, { passive: false });

  zone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (joyTouches[t.identifier] === zoneId) handleMove(t.clientX, t.clientY);
    }
  }, { passive: false });

  zone.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (joyTouches[t.identifier] === zoneId) {
        delete joyTouches[t.identifier];
        resetJoy();
      }
    }
  });

  zone.addEventListener('touchcancel', e => {
    for (const t of e.changedTouches) {
      if (joyTouches[t.identifier] === zoneId) {
        delete joyTouches[t.identifier];
        resetJoy();
      }
    }
  });
}

setupJoystick('joyLeft', 'knobLeft', joyInputLeft);
setupJoystick('joyRight', 'knobRight', joyInputRight);

// ==================== START ====================
document.getElementById('startBtn').onclick = () => {
  document.getElementById('startScreen').style.display = 'none';
  showLevelSelect();
};

// ==================== GAME LOOP ====================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
